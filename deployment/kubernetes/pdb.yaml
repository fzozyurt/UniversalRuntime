apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway
  namespace: universal-runtime
spec:
  minAvailable: 1
  selector: {matchLabels: {app: gateway}}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker
  namespace: universal-runtime
spec:
  minAvailable: 1
  selector: {matchLabels: {app: worker}}
