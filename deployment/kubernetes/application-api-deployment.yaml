apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-api
  namespace: universal-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: application-api
  template:
    metadata:
      labels:
        app: application-api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: application-api
          image: universal-runtime-agent-base:0.1.0
          command:
            - universal-runtime
            - api
            - --entrypoint
            - application.http
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          envFrom:
            - {configMapRef: {name: universal-runtime-config}}
            - {secretRef: {name: universal-runtime-secrets}}
          ports:
            - {name: http, containerPort: 8000}
          readinessProbe:
            httpGet: {path: /openapi.json, port: http}
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /openapi.json, port: http}
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - {name: tmp, emptyDir: {}}
