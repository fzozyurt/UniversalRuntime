apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: runtime-default
  namespace: universal-runtime
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: {kubernetes.io/metadata.name: universal-runtime}
  egress:
    - to:
        - namespaceSelector:
            matchLabels: {kubernetes.io/metadata.name: universal-runtime}
