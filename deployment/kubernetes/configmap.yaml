apiVersion: v1
kind: ConfigMap
metadata:
  name: universal-runtime-config
  namespace: universal-runtime
data:
  UR_PROFILE: production
  UR_TOPIC_PREFIX: rt
  UR_KAFKA_ENVIRONMENT: production
  UR_WORKSPACE_KEY: default
  UR_APPLICATION_ID: application
  UR_DEPLOYMENT_ID: application-production
  UR_GATEWAY_PORT: "8080"
  UR_GATEWAY_GRPC_PORT: "9091"
  UR_GATEWAY_CONTROL_GRPC_PORT: "9092"
  UR_GRPC_PORT: "9090"
  UR_WORKER_MAX_CONCURRENCY: "8"
  UR_WORKER_DRAIN_TIMEOUT_SECONDS: "30"
  UR_WORKER_APPLICATION_ENTRYPOINTS: application.graph:graph
  UR_APPLICATION_MIGRATION_REVISION: head
  ARTIFACT_VERSION: development
  UR_CONTRACT_SCHEMA_PATH: /opt/universal-runtime/contracts/config/runtime-application.schema.json
