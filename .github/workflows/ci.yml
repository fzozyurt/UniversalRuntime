name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[dev,langgraph,fastapi,a2a]'
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src services
      - run: python scripts/check_architecture.py
      - run: python scripts/validate_contracts.py
      - run: pytest -q --cov=src --cov=services --cov-report=term-missing --cov-fail-under=80
