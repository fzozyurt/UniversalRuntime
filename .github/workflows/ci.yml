name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,langgraph,fastapi,a2a,kafka]'
      - name: Run all quality gates
        shell: bash
        run: |
          set +e
          mkdir -p reports
          status=0

          run_gate() {
            name="$1"
            shift
            echo "::group::$name"
            "$@" 2>&1 | tee "reports/${name}.log"
            code=${PIPESTATUS[0]}
            echo "::endgroup::"
            if [ "$code" -ne 0 ]; then
              status=1
            fi
          }

          run_gate ruff ruff check .
          run_gate format ruff format --check .
          run_gate mypy mypy src
          run_gate architecture python scripts/check_architecture.py
          run_gate contracts python scripts/validate_contracts.py
          run_gate tests pytest -q \
            --junitxml=reports/pytest.xml \
            --cov=src/universal_runtime \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --cov-fail-under=80
          run_gate wheel-smoke bash -lc '
            rm -rf dist .tmp/wheel-smoke &&
            python -m build --wheel --outdir dist &&
            python -m venv .tmp/wheel-smoke &&
            .tmp/wheel-smoke/bin/python -m pip install --upgrade pip &&
            .tmp/wheel-smoke/bin/python -m pip install dist/*.whl &&
            .tmp/wheel-smoke/bin/python -c "import universal_runtime; import universal_runtime.bootstrap.cli; import universal_runtime.domain.execution"
          '

          exit "$status"
      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ github.run_attempt }}
          path: reports/
          if-no-files-found: warn
          retention-days: 14
