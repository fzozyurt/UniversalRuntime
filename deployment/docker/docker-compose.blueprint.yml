services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: runtime
      POSTGRES_PASSWORD: runtime
      POSTGRES_DB: runtime
    ports: ["5432:5432"]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports: ["9092:9092"]

  migrate:
    build:
      context: ../..
      dockerfile: container/Dockerfile
    environment:
      UR_MODE: migrate
      UR_DATABASE_URL: postgresql+psycopg://runtime:runtime@postgres:5432/runtime
    command: ["--application-id", "platform", "--environment", "local"]
    depends_on: [postgres]

  application-api:
    build:
      context: ../..
      dockerfile: container/Dockerfile
    environment:
      UR_MODE: api
    command: ["--entrypoint", "application.http", "--host", "0.0.0.0", "--port", "8000"]
    depends_on: [migrate]

  gateway-1: &gateway
    build:
      context: ../..
      dockerfile: container/Dockerfile
    environment:
      UR_MODE: gateway
      UR_PROFILE: production
      UR_INSTANCE_ID: gateway-1
      UR_DATABASE_URL: postgresql+psycopg://runtime:runtime@postgres:5432/runtime
      UR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UR_KAFKA_ENVIRONMENT: local
      UR_APPLICATION_ID: application
      UR_DEPLOYMENT_ID: application-local
      UR_APPLICATION_HTTP_TARGET: http://application-api:8000
    depends_on: [migrate, kafka, application-api]

  gateway-2:
    <<: *gateway
    environment:
      UR_MODE: gateway
      UR_PROFILE: production
      UR_INSTANCE_ID: gateway-2
      UR_DATABASE_URL: postgresql+psycopg://runtime:runtime@postgres:5432/runtime
      UR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UR_KAFKA_ENVIRONMENT: local
      UR_APPLICATION_ID: application
      UR_DEPLOYMENT_ID: application-local
      UR_APPLICATION_HTTP_TARGET: http://application-api:8000

  worker-1: &worker
    build:
      context: ../..
      dockerfile: container/Dockerfile
    environment:
      UR_MODE: worker
      UR_PROFILE: production
      UR_INSTANCE_ID: worker-1
      UR_DATABASE_URL: postgresql+psycopg://runtime:runtime@postgres:5432/runtime
      UR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UR_KAFKA_ENVIRONMENT: local
      UR_APPLICATION_ID: application
      UR_DEPLOYMENT_ID: application-local
      UR_GATEWAY_CONTROL_GRPC_TARGET: gateway-1:9092
      UR_WORKER_ADVERTISE_TARGET: worker-1:9090
      UR_APPLICATION_ENTRYPOINTS: application.graph:graph
      UR_WORKER_MAX_CONCURRENCY: 8
    depends_on: [gateway-1, kafka]

  worker-2:
    <<: *worker
    environment:
      UR_MODE: worker
      UR_PROFILE: production
      UR_INSTANCE_ID: worker-2
      UR_DATABASE_URL: postgresql+psycopg://runtime:runtime@postgres:5432/runtime
      UR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UR_KAFKA_ENVIRONMENT: local
      UR_APPLICATION_ID: application
      UR_DEPLOYMENT_ID: application-local
      UR_GATEWAY_CONTROL_GRPC_TARGET: gateway-2:9092
      UR_WORKER_ADVERTISE_TARGET: worker-2:9090
      UR_APPLICATION_ENTRYPOINTS: application.graph:graph
      UR_WORKER_MAX_CONCURRENCY: 8

  haproxy:
    image: haproxy:3.0
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports: ["8080:8080"]
    depends_on: [gateway-1, gateway-2]
