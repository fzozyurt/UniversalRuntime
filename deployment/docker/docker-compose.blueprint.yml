services:
  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    environment:
      POSTGRES_USER: runtime
      POSTGRES_PASSWORD: runtime
      POSTGRES_DB: runtime
    ports: ["5432:5432"]

  kafka:
    image: confluentinc/cp-kafka:7.6.1@sha256:620734d9fc0bb1f9886932e5baf33806074469f40e3fe246a3fdbb59309535fa
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports: ["9092:9092"]

  gateway-1: &gateway
    build:
      context: ../..
      dockerfile: container/Dockerfile
    environment:
      UR_MODE: gateway
      UR_PROFILE: production
      UR_DATABASE_URL: postgresql+psycopg://runtime:runtime@postgres:5432/runtime
      UR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on: [postgres, kafka]

  gateway-2:
    <<: *gateway

  dispatcher-1: &dispatcher
    <<: *gateway
    environment:
      UR_MODE: dispatcher
      UR_PROFILE: production
      UR_DATABASE_URL: postgresql+psycopg://runtime:runtime@postgres:5432/runtime
      UR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  dispatcher-2:
    <<: *dispatcher

  worker-1: &worker
    <<: *gateway
    environment:
      UR_MODE: worker
      UR_PROFILE: production
      UR_DATABASE_URL: postgresql+psycopg://runtime:runtime@postgres:5432/runtime
      UR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UR_WORKER_MAX_CONCURRENCY: 8

  worker-2:
    <<: *worker

  haproxy:
    image: haproxy:3.0
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports: ["8080:8080"]
    depends_on: [gateway-1, gateway-2]
