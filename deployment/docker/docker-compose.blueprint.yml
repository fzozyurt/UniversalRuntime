services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: runtime
      POSTGRES_PASSWORD: runtime
      POSTGRES_DB: runtime
    ports: ["5432:5432"]

  kafka:
    image: bitnami/kafka:latest
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    ports: ["9092:9092"]

  gateway-1: &gateway
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    environment:
      UR_MODE: gateway
      UR_PROFILE: production
      UR_DATABASE_URL: postgresql+psycopg://runtime:runtime@postgres:5432/runtime
      UR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on: [postgres, kafka]

  gateway-2:
    <<: *gateway

  dispatcher-1: &dispatcher
    <<: *gateway
    environment:
      UR_MODE: dispatcher
      UR_PROFILE: production
      UR_DATABASE_URL: postgresql+psycopg://runtime:runtime@postgres:5432/runtime
      UR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  dispatcher-2:
    <<: *dispatcher

  worker-1: &worker
    <<: *gateway
    environment:
      UR_MODE: worker
      UR_PROFILE: production
      UR_DATABASE_URL: postgresql+psycopg://runtime:runtime@postgres:5432/runtime
      UR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UR_WORKER_MAX_CONCURRENCY: 8

  worker-2:
    <<: *worker

  haproxy:
    image: haproxy:3.0
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports: ["8080:8080"]
    depends_on: [gateway-1, gateway-2]
