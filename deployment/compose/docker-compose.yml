name: universal-runtime

services:
  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    pull_policy: never
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-runtime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-runtime}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00-runtime.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.6.1@sha256:620734d9fc0bb1f9886932e5baf33806074469f40e3fe246a3fdbb59309535fa
    pull_policy: never
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 15s
      retries: 20

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1@sha256:620734d9fc0bb1f9886932e5baf33806074469f40e3fe246a3fdbb59309535fa
    pull_policy: never
    environment:
      UR_TOPIC_PREFIX: ${UR_TOPIC_PREFIX:-rt}
      UR_KAFKA_ENVIRONMENT: ${UR_KAFKA_ENVIRONMENT:-local}
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        root="$${UR_TOPIC_PREFIX}.$${UR_KAFKA_ENVIRONMENT}"
        for suffix in runs.interactive runs.normal runs.batch execution.events run.lifecycle run.commands deadletter; do
          kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic "$${root}.$${suffix}.v1" --partitions 3 --replication-factor 1
        done
    restart: "no"

  migrate:
    image: universal-runtime:local
    pull_policy: never
    environment:
      UR_MODE: migrate
      UR_MIGRATION_DATABASE_URL: postgresql+psycopg://runtime:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/runtime
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--config", "/opt/universal-runtime/runtime.yaml", "--application-id", "platform", "--environment", "local"]
    restart: "no"

  gateway-1: &gateway
    image: universal-runtime:local
    pull_policy: never
    build:
      context: ../..
      dockerfile: container/Dockerfile
      pull: false
    environment: &platform-env
      UR_MODE: gateway
      UR_PROFILE: production
      UR_INSTANCE_ID: gateway-1
      UR_GATEWAY_HOST: 0.0.0.0
      UR_GATEWAY_PORT: 8080
      UR_DATABASE_URL: postgresql+psycopg://runtime:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/runtime
      UR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UR_TOPIC_PREFIX: ${UR_TOPIC_PREFIX:-rt}
      UR_KAFKA_ENVIRONMENT: ${UR_KAFKA_ENVIRONMENT:-local}
      UR_CONTRACT_SCHEMA_PATH: /opt/universal-runtime/contracts/config/runtime-application.schema.json
      UR_WORKSPACE_ID: default
      UR_PROJECT_ID: default
      UR_APPLICATION_ID: phase1_agent
      UR_REVISION_ID: revision-1
      UR_DEPLOYMENT_ID: phase1-agent-local
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/usr/local/bin/runtime-healthcheck.py"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway-2:
    <<: *gateway
    environment:
      <<: *platform-env
      UR_INSTANCE_ID: gateway-2

  standalone:
    <<: *gateway
    profiles: ["compact"]
    ports:
      - "${UR_PUBLIC_PORT:-8080}:8080"
    environment:
      <<: *platform-env
      UR_MODE: standalone
      UR_INSTANCE_ID: standalone-1
      UR_APPLICATION_ENTRYPOINTS: phase1_agent.graph:build_graph,phase1_agent.deep_agent:build_deep_agent
      UR_APPLICATION_NAME: phase1-agent
      UR_WORKER_TARGETS: 127.0.0.1:9090
      UR_GATEWAY_REGISTER_URL: http://127.0.0.1:8080/internal/workers/register
      UR_WORKER_ADVERTISE_TARGET: 127.0.0.1:9090
      PYTHONPATH: /opt/universal-runtime/applications/phase1-agent

  dispatcher-1: &dispatcher
    image: universal-runtime:local
    pull_policy: never
    environment:
      <<: *platform-env
      UR_MODE: dispatcher
      UR_INSTANCE_ID: dispatcher-1
      UR_WORKER_TARGETS: worker-1:9090,worker-2:9090
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  dispatcher-2:
    <<: *dispatcher
    environment:
      <<: *platform-env
      UR_MODE: dispatcher
      UR_INSTANCE_ID: dispatcher-2
      UR_WORKER_TARGETS: worker-1:9090,worker-2:9090

  worker-1: &worker
    image: universal-runtime:local
    pull_policy: never
    environment: &application-env
      <<: *platform-env
      UR_MODE: worker
      UR_INSTANCE_ID: worker-1
      UR_GRPC_HOST: 0.0.0.0
      UR_GRPC_PORT: 9090
      UR_WORKER_MAX_CONCURRENCY: ${UR_WORKER_MAX_CONCURRENCY:-8}
      UR_GATEWAY_REGISTER_URL: http://gateway-1:8080/internal/workers/register
      UR_WORKER_ADVERTISE_TARGET: worker-1:9090
      UR_APPLICATION_ENTRYPOINTS: phase1_agent.graph:build_graph,phase1_agent.deep_agent:build_deep_agent
      UR_APPLICATION_NAME: phase1-agent
      PYTHONPATH: /opt/universal-runtime/applications/phase1-agent
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  worker-2:
    <<: *worker
    environment:
      <<: *application-env
      UR_INSTANCE_ID: worker-2
      UR_GATEWAY_REGISTER_URL: http://gateway-2:8080/internal/workers/register
      UR_WORKER_ADVERTISE_TARGET: worker-2:9090

  projector:
    image: universal-runtime:local
    pull_policy: never
    environment:
      <<: *platform-env
      UR_MODE: projector
      UR_INSTANCE_ID: projector-1
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  haproxy:
    image: haproxy:3.0
    pull_policy: if_not_present
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "${UR_PUBLIC_PORT:-8080}:8080"
    depends_on:
      gateway-1:
        condition: service_healthy
      gateway-2:
        condition: service_healthy

volumes:
  postgres-data:
  kafka-data:
