global
  log stdout format raw local0
  maxconn 4096

defaults
  mode http
  option httplog
  timeout connect 5s
  timeout client 1h
  timeout server 1h
  timeout tunnel 1h

frontend runtime_http
  bind :8080
  default_backend gateways

backend gateways
  balance source
  option httpchk GET /ready
  http-check expect status 200
  server gateway-1 gateway-1:8080 check inter 2s fall 3 rise 2
  server gateway-2 gateway-2:8080 check inter 2s fall 3 rise 2
