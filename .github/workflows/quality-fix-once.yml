name: quality-fix-once

on:
  push:
    branches:
      - agent/application-deployment-boundaries

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/application-deployment-boundaries
      - name: Check one-time marker
        id: marker
        shell: bash
        run: |
          if [ -f .github/quality-fix.pending ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.marker.outputs.run == 'true'
        with:
          python-version: '3.12'
      - name: Apply safe mechanical fixes
        if: steps.marker.outputs.run == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip ruff
          python - <<'PY'
          from pathlib import Path

          path = Path("src/universal_runtime/adapters/postgres/workers.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              'return reclaimed + int(result.rowcount or 0)',
              'return reclaimed + int(getattr(result, "rowcount", 0) or 0)',
          )
          path.write_text(text, encoding="utf-8")
          PY
          ruff check --fix src tests scripts migrations
          ruff format src tests scripts migrations
          rm .github/quality-fix.pending
      - name: Commit quality fixes
        if: steps.marker.outputs.run == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests scripts migrations .github/quality-fix.pending
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: apply Ruff formatting and import fixes"
          git push origin HEAD:agent/application-deployment-boundaries
